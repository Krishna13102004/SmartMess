spring.application.name=smartmess-api
server.port=8080

# MySQL Connection (Permanent Database)
spring.datasource.url=jdbc:mysql://localhost:3306/smart_mess?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# 👇 MUKKIYAM: Unga MySQL Password inga podu (Ex: root, admin, 1234)
spring.datasource.password=12345

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Settings (Idhu tables-a automatic-a sync pannikkum)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true